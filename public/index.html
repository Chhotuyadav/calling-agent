<!DOCTYPE html>
<html>
<head>
  <title>AI Voice Agent</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; }
    #status { color: blue; font-weight: bold; margin: 15px 0; }

    button { padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 10px 5px; border-radius: 8px; }
    .stop { background-color: #ff4444; color: white; border: none; display: none; }
    .start { background-color: #44ff44; border: none; }

    #chat {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      height: 420px;
      overflow-y: auto;
      background: #fafafa;
    }

    .msg { padding: 10px 12px; border-radius: 12px; margin: 8px 0; max-width: 85%; }
    .user { background: #d6f0ff; margin-left: auto; text-align: right; }
    .ai { background: #e9ffe0; margin-right: auto; }
    .meta { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
  </style>
</head>

<body>
  <h1>AI Voice Agent</h1>

  <div id="status">Status: Idle (Press Start)</div>

  <button id="startBtn" class="start">Start Talking</button>
  <button id="stopBtn" class="stop">Stop Agent</button>

  <h3>Chat</h3>
  <div id="chat"></div>

  <script>window.WS_URL = "${process.env.WS_URL || 'ws://localhost:3000/ws'}";</script>
  <script src="/js/client.js"></script>
</body>
</html>
